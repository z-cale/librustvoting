name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-lint-go-${{ hashFiles('sdk/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-lint-go-
      - name: Run go vet
        run: go vet ./...

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build Rust circuits library
        run: make circuits
      - name: Run unit tests
        run: make test-unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build Rust circuits library
        run: make circuits
      - name: Run integration tests
        run: make test-integration

  test-halo2:
    name: Halo2 ZKP Verification Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build Rust circuits library
        run: make circuits
      - name: Run Rust circuit tests
        run: make circuits-test
      - name: Run Go Halo2 verification tests
        run: make test-halo2

  test-api:
    name: API Integration Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build (circuits + e2e-tests + tree client + helper-server)
        uses: actions/cache@v4
        with:
          path: |
            sdk/circuits/target
            e2e-tests/target
            vote-commitment-tree-client/target
            helper-server/target
          key: ${{ runner.os }}-api-rust-${{ hashFiles('sdk/circuits/Cargo.lock', 'e2e-tests/Cargo.lock', 'vote-commitment-tree-client/Cargo.lock', 'helper-server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-api-rust-
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: sdk/.cache/go-build
          key: ${{ runner.os }}-api-go-${{ hashFiles('sdk/go.sum', 'sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-api-go-
      - name: Build and install zallyd
        run: make install-ffi
        env:
          GOCACHE: ${{ github.workspace }}/sdk/.cache/go-build
      - name: Pre-build vote-commitment-tree-client
        run: cargo build --release --manifest-path ../vote-commitment-tree-client/Cargo.toml
      - name: Initialize chain
        run: bash scripts/init.sh
      - name: Start chain in background
        run: |
          zallyd start --home ~/.zallyd > chain.log 2>&1 &
          echo "Chain PID: $!"
      - name: Wait for chain readiness
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:1318/cosmos/base/tendermint/v1beta1/blocks/latest > /dev/null 2>&1; then
              echo "Chain is producing blocks"
              exit 0
            fi
            echo "Waiting for chain to start... ($i/60)"
            sleep 2
          done
          echo "Chain failed to start within 120s"
          cat chain.log
          exit 1
      - name: Build helper server
        run: cargo build --release --manifest-path ../helper-server/Cargo.toml --bin helper-server
      - name: Start helper server in background
        run: |
          ../helper-server/target/release/helper-server \
            --tree-node http://localhost:1318 \
            --chain-submit http://localhost:1318 \
            --min-delay 1 --max-delay 3 \
            --db-path :memory: > helper-server.log 2>&1 &
          echo "Helper server PID: $!"
      - name: Wait for helper server readiness
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9091/api/v1/status > /dev/null 2>&1; then
              echo "Helper server is ready"
              exit 0
            fi
            echo "Waiting for helper server... ($i/15)"
            sleep 1
          done
          echo "Helper server failed to start"
          cat helper-server.log
          exit 1
      - name: Run E2E test (voting_flow_librustvoting)
        run: cargo test --release --manifest-path ../e2e-tests/Cargo.toml --test voting_flow_librustvoting -- --nocapture --ignored --test-threads=1
        env:
          ZALLY_API_URL: http://localhost:1318
          ZALLY_EA_PK_PATH: /home/runner/.zallyd/ea.pk
          HELPER_SERVER_URL: http://localhost:9091
          ZALLY_E2E_VOTE_WINDOW_SECS: "420"
      - name: Upload chain log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chain-log
          path: sdk/chain.log
          retention-days: 7
      - name: Upload helper server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: helper-server-log
          path: sdk/helper-server.log
          retention-days: 7
