name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-lint-go-${{ hashFiles('sdk/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-lint-go-
      - name: Run go vet
        run: mise run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build circuits
        run: mise run build:circuits
      - name: Run unit tests
        run: mise run test:unit

  test-helper:
    name: Helper Server Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Run helper tests
        run: mise run test:helper

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build circuits
        run: mise run build:circuits
      - name: Run integration tests
        run: mise run test:integration

  test-halo2:
    name: Halo2 ZKP Verification Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build circuits
        run: mise run build:circuits
      - name: Run Rust circuit tests
        run: mise run test:circuits
      - name: Run Go Halo2 verification tests
        run: mise run test:halo2

  test-vc-van-deterministic:
    name: VC/VAN Deterministic Stress
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      GOCACHE: ${{ github.workspace }}/sdk/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/sdk/.cache/go-mod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build (circuits)
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-vc-van-deterministic-go-${{ hashFiles('sdk/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-vc-van-deterministic-go-
      - name: Build circuits
        run: mise run build:circuits
      - name: Run deterministic VC/VAN tree stress tests
        run: mise run test:tree-stress

  test-api:
    name: API Integration Tests
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Add GOBIN to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Cache Rust build (circuits + e2e-tests + tree client)
        uses: actions/cache@v4
        with:
          path: |
            sdk/circuits/target
            e2e-tests/target
            vote-commitment-tree-client/target
          key: ${{ runner.os }}-api-rust-${{ hashFiles('sdk/circuits/Cargo.lock', 'e2e-tests/Cargo.lock', 'vote-commitment-tree-client/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-api-rust-
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            sdk/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-api-go-${{ hashFiles('sdk/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-api-go-
      - name: Pre-build vote-commitment-tree-client
        run: cargo build --release --manifest-path vote-commitment-tree-client/Cargo.toml
      - name: Start chain
        run: mise run start:chain
        env:
          GOCACHE: ${{ github.workspace }}/sdk/.cache/go-build
          SVOTE_PIR_URL: "disabled"
      - name: Run E2E test (round_activation)
        run: cargo test --release --manifest-path e2e-tests/Cargo.toml --test round_activation -- --nocapture --ignored --test-threads=1
        env:
          SVOTE_API_URL: http://localhost:1318
      - name: Run E2E test (voting_flow_librustvoting)
        run: cargo test --release --manifest-path e2e-tests/Cargo.toml --test voting_flow_librustvoting -- --nocapture --ignored --test-threads=1
        env:
          SVOTE_API_URL: http://localhost:1318
          HELPER_SERVER_URL: http://localhost:1318
          SVOTE_E2E_VOTE_WINDOW_SECS: "420"
      - name: Upload chain log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chain-log
          path: svoted.log
          retention-days: 7

  test-multi-validator:
    name: Multi-Validator E2E
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Add GOBIN to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Cache Rust build (circuits + e2e-tests + tree client)
        uses: actions/cache@v4
        with:
          path: |
            sdk/circuits/target
            e2e-tests/target
            vote-commitment-tree-client/target
          key: ${{ runner.os }}-multi-rust-${{ hashFiles('sdk/circuits/Cargo.lock', 'e2e-tests/Cargo.lock', 'vote-commitment-tree-client/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-multi-rust-
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            sdk/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-multi-go-${{ hashFiles('sdk/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-multi-go-
      - name: Pre-build vote-commitment-tree-client
        run: cargo build --release --manifest-path vote-commitment-tree-client/Cargo.toml
      - name: Start 3-validator chain
        run: mise run multi:start-chain
        env:
          GOCACHE: ${{ github.workspace }}/sdk/.cache/go-build
          SVOTE_PIR_URL: "disabled"
      - name: Wait for helper server readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1418/api/v1/status > /dev/null 2>&1; then
              echo "Helper server is ready on val1"
              exit 0
            fi
            echo "Waiting for helper server... ($i/30)"
            sleep 2
          done
          echo "Helper server failed to start"
          tail -50 sdk/multi-val1.log
          exit 1
      - name: Set multi-validator env
        run: |
          echo "SVOTE_HOME=$HOME/.svoted-val1" >> $GITHUB_ENV
          echo "SVOTE_NODE_URL=tcp://localhost:26157" >> $GITHUB_ENV
          echo "SVOTE_PALLAS_PK_PATH=$HOME/.svoted-val1/pallas.pk" >> $GITHUB_ENV
      - name: Run E2E test (round_activation)
        run: cargo test --release --manifest-path e2e-tests/Cargo.toml --test round_activation -- --nocapture --ignored --test-threads=1
        env:
          SVOTE_API_URL: http://localhost:1418
      - name: Run E2E test (voting_flow_librustvoting)
        run: cargo test --release --manifest-path e2e-tests/Cargo.toml --test voting_flow_librustvoting -- --nocapture --ignored --test-threads=1
        env:
          SVOTE_API_URL: http://localhost:1418
          HELPER_SERVER_URL: http://localhost:1418
          SVOTE_E2E_VOTE_WINDOW_SECS: "420"
      - name: Restart val2 and verify recovery
        run: mise run test:restart
        env:
          SVOTE_PIR_URL: "disabled"
      - name: Run E2E test (round_activation after restart)
        run: cargo test --release --manifest-path e2e-tests/Cargo.toml --test round_activation -- --nocapture --ignored --test-threads=1
        env:
          SVOTE_API_URL: http://localhost:1418
      - name: Upload validator logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: multi-validator-logs
          path: |
            sdk/multi-val1.log
            sdk/multi-val2.log
            sdk/multi-val3.log
          retention-days: 7

  test-join:
    name: Validator Join Flow
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Add GOBIN to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Cache Rust build (circuits)
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-join-rust-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-join-rust-
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            sdk/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-join-go-${{ hashFiles('sdk/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-join-go-
      - name: Build and install svoted + create-val-tx
        run: mise run build:install
        env:
          GOCACHE: ${{ github.workspace }}/sdk/.cache/go-build
      - name: Initialize chain
        run: mise run chain:init
      - name: Start chain in background
        run: |
          svoted start --home ~/.svoted > sdk/chain.log 2>&1 &
          echo "Chain PID: $!"
      - name: Wait for chain readiness
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:1318/cosmos/base/tendermint/v1beta1/blocks/latest > /dev/null 2>&1; then
              echo "Chain is producing blocks"
              exit 0
            fi
            echo "Waiting for chain to start... ($i/60)"
            sleep 2
          done
          echo "Chain failed to start within 120s"
          cat sdk/chain.log
          exit 1
      - name: Run validator join smoke test
        run: mise run test:join
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: join-test-logs
          path: |
            sdk/chain.log
            joiner.log
          retention-days: 7
