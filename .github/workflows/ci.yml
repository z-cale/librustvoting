name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Run go vet
        run: go vet ./...

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build Rust circuits library
        run: make circuits
      - name: Run unit tests
        run: make test-unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build Rust circuits library
        run: make circuits
      - name: Run integration tests
        run: make test-integration

  test-halo2:
    name: Halo2 ZKP Verification Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: sdk/circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build Rust circuits library
        run: make circuits
      - name: Run Rust circuit tests
        run: make circuits-test
      - name: Run Go Halo2 verification tests
        run: make test-halo2

  test-api:
    name: API Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build (circuits + e2e-tests + tree client)
        uses: actions/cache@v4
        with:
          path: |
            sdk/circuits/target
            e2e-tests/target
            vote-commitment-tree-client/target
          key: ${{ runner.os }}-api-rust-${{ hashFiles('sdk/circuits/Cargo.lock', 'e2e-tests/Cargo.lock', 'vote-commitment-tree-client/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-api-rust-
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: sdk/.cache/go-build
          key: ${{ runner.os }}-api-go-${{ hashFiles('sdk/go.sum', 'sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-api-go-
      - name: Build and install zallyd
        run: make install-ffi
        env:
          GOCACHE: ${{ github.workspace }}/sdk/.cache/go-build
      - name: Pre-build vote-commitment-tree-client
        run: cargo build --release --manifest-path ../vote-commitment-tree-client/Cargo.toml
      - name: Initialize chain
        run: bash scripts/init.sh
      - name: Start chain in background
        run: |
          zallyd start --home ~/.zallyd > chain.log 2>&1 &
          echo "Chain PID: $!"
      - name: Wait for chain readiness
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:1317/cosmos/base/tendermint/v1beta1/blocks/latest > /dev/null 2>&1; then
              echo "Chain is producing blocks"
              exit 0
            fi
            echo "Waiting for chain to start... ($i/60)"
            sleep 2
          done
          echo "Chain failed to start within 120s"
          cat chain.log
          exit 1
      - name: Run Rust E2E API tests
        run: cargo test --release --manifest-path ../e2e-tests/Cargo.toml -- --nocapture --ignored --test-threads=1
        env:
          ZALLY_API_URL: http://localhost:1317
      - name: Upload chain log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chain-log
          path: sdk/chain.log
          retention-days: 7
