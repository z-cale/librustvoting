# Send stake to a new validator address on the prod chain.
#
# Trigger from the GitHub Actions UI: Actions → Fund validator → Run workflow.
# Enter the new validator's address (zvote1...) and it sends 5 stake from val1.

name: Fund validator

on:
  workflow_dispatch:
    inputs:
      address:
        description: "New validator address (zvote1...)"
        required: true
        type: string

env:
  DEPLOY_PATH: /opt/zally-chain

jobs:
  fund:
    name: Send stake
    runs-on: ubuntu-latest
    steps:
      - name: Send 5 stake to new validator
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export PATH="${{ env.DEPLOY_PATH }}:$PATH"
            echo "Sending 5stake to ${{ inputs.address }}..."
            RESULT=$(zallyd tx bank send validator "${{ inputs.address }}" 5stake \
              --keyring-backend test \
              --chain-id zvote-1 \
              --home "${{ env.DEPLOY_PATH }}/.zallyd-val1" \
              --node tcp://localhost:26157 \
              --yes \
              --output json 2>&1)
            echo "$RESULT"
            TXHASH=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('txhash',''))" 2>/dev/null || echo "")
            if [ -n "$TXHASH" ]; then
              echo ""
              echo "Success! tx: $TXHASH"
            else
              echo ""
              echo "WARNING: Could not parse txhash from output. Check logs above."
            fi
