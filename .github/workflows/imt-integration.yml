name: IMT ZK Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'voting-circuits/**'
      - 'nullifier-ingest/imt-tree/**'
      - 'orchard/**'
  pull_request:
    branches: [main]
    paths:
      - 'voting-circuits/**'
      - 'nullifier-ingest/imt-tree/**'
      - 'orchard/**'

permissions:
  contents: read

jobs:
  test-imt-integration:
    name: IMT ZK Integration Tests
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            voting-circuits/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-voting-circuits-imt-${{ hashFiles('voting-circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-voting-circuits-imt-
      - name: Run IMT integration test
        run: cargo test --test imt_circuit_integration -- --nocapture
        working-directory: voting-circuits
