# Build pre-compiled binaries and publish a GitHub Release on version tags.
#
# Tarball layout:
#   zally-<version>-<platform>/
#     bin/zallyd, create-val-tx, query-server, ingest-nfs
#     systemd/zallyd-val{1,2,3}.service, nullifier-query-server.service  (Linux only)
#     scripts/init_multi_ci.sh
#     config/Caddyfile
#
# Platforms: linux-amd64, linux-arm64, darwin-amd64, darwin-arm64

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-sdk:
    name: Build SDK (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-latest
            platform: darwin-amd64
            cross: true
            rust_target: x86_64-apple-darwin
            goarch: amd64
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: sdk/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target || '' }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            sdk/circuits/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.platform }}-sdk-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-sdk-circuits-

      - name: Build Rust circuits library
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo build --release --manifest-path circuits/Cargo.toml --target ${{ matrix.rust_target }}
            # Symlink cross-compiled lib into the expected location for CGo
            mkdir -p circuits/target/release
            ln -sf $(pwd)/circuits/target/${{ matrix.rust_target }}/release/libzally_circuits.a \
                   circuits/target/release/libzally_circuits.a
          else
            make circuits
          fi

      - name: Build zallyd with FFI
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            # Cross-compile Go+CGo for x86_64 from ARM64 macOS
            CC="clang -target x86_64-apple-macosx" \
            CGO_CFLAGS="-target x86_64-apple-macosx" \
            CGO_LDFLAGS="-target x86_64-apple-macosx" \
            CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.goarch }} \
              go build -tags "halo2,redpallas" -o zallyd ./cmd/zallyd
          else
            make build-ffi
          fi

      - name: Build create-val-tx helper
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.goarch }} go build -o create-val-tx ./scripts/create-val-tx
          else
            go build -o create-val-tx ./scripts/create-val-tx
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-binaries-${{ matrix.platform }}
          path: |
            sdk/zallyd
            sdk/create-val-tx

  build-ingest:
    name: Build nullifier-ingest (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-latest
            platform: darwin-amd64
            cross: true
            rust_target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target || '' }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            nullifier-ingest/imt-tree/target
            nullifier-ingest/service/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.platform }}-nullifier-ingest-${{ hashFiles('nullifier-ingest/service/Cargo.lock', 'nullifier-ingest/imt-tree/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-nullifier-ingest-

      - name: Build release binaries
        working-directory: nullifier-ingest
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cd service && cargo build --release --target ${{ matrix.rust_target }}
            # Copy cross-compiled binaries to the expected release location
            mkdir -p target/release
            cp target/${{ matrix.rust_target }}/release/query-server target/release/
            cp target/${{ matrix.rust_target }}/release/ingest-nfs target/release/
          else
            make build
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ingest-binaries-${{ matrix.platform }}
          path: |
            nullifier-ingest/service/target/release/query-server
            nullifier-ingest/service/target/release/ingest-nfs

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-sdk, build-ingest]
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  release:
    name: Package and release (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            os_family: linux
          - platform: linux-arm64
            os_family: linux
          - platform: darwin-amd64
            os_family: darwin
          - platform: darwin-arm64
            os_family: darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SDK binaries
        uses: actions/download-artifact@v4
        with:
          name: sdk-binaries-${{ matrix.platform }}
          path: sdk-binaries

      - name: Download ingest binaries
        uses: actions/download-artifact@v4
        with:
          name: ingest-binaries-${{ matrix.platform }}
          path: ingest-binaries

      - name: Assemble tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="zally-${VERSION}-${{ matrix.platform }}"
          mkdir -p "${DIR}/bin" "${DIR}/scripts" "${DIR}/config"

          # Binaries (artifact downloads flatten the common path prefix)
          cp sdk-binaries/zallyd sdk-binaries/create-val-tx "${DIR}/bin/"
          cp ingest-binaries/query-server "${DIR}/bin/"
          cp ingest-binaries/ingest-nfs "${DIR}/bin/"
          chmod +x "${DIR}/bin/"*

          # Systemd service files — Linux only, transform paths for /opt/zally layout
          if [ "${{ matrix.os_family }}" = "linux" ]; then
            mkdir -p "${DIR}/systemd"
            for f in sdk/docs/zallyd-val{1,2,3}.service; do
              name=$(basename "$f")
              sed -e 's|/opt/zally-chain|/opt/zally|g' \
                  -e 's|ExecStart=/opt/zally/zallyd|ExecStart=/opt/zally/bin/zallyd|' \
                  "$f" > "${DIR}/systemd/${name}"
            done

            # Nullifier query server service — remap paths to /opt/zally layout
            sed -e 's|WorkingDirectory=/opt/nullifier-ingest|WorkingDirectory=/opt/zally/nullifier-data|' \
                -e 's|DATA_DIR=/opt/nullifier-ingest|DATA_DIR=/opt/zally/nullifier-data|' \
                -e 's|ExecStart=/opt/nullifier-ingest/query-server|ExecStart=/opt/zally/bin/query-server|' \
                nullifier-ingest/docs/nullifier-query-server.service > "${DIR}/systemd/nullifier-query-server.service"
          fi

          # Scripts
          cp sdk/scripts/init_multi_ci.sh "${DIR}/scripts/"

          # Config
          cp sdk/deploy/Caddyfile "${DIR}/config/"

          # Create tarball
          tar czf "${DIR}.tar.gz" "${DIR}"
          echo "TARBALL=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball-${{ matrix.platform }}
          path: ${{ env.TARBALL }}

      - name: Attach to GitHub Release
        run: gh release upload "${GITHUB_REF_NAME}" "${TARBALL}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  distribute:
    name: Distribute to server
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux-amd64 release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball-linux-amd64

      - name: Download linux-arm64 release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball-linux-arm64

      - name: Download darwin-amd64 release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball-darwin-amd64

      - name: Download darwin-arm64 release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball-darwin-arm64

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Upload to DigitalOcean Spaces
        continue-on-error: true
        env:
          DO_ACCESS_KEY: ${{ secrets.DO_ACCESS_KEY }}
          DO_SECRET_KEY: ${{ secrets.DO_SECRET_KEY }}
        run: |
          pip install --quiet s3cmd
          cat > /tmp/do-spaces.s3cfg <<EOF
          [default]
          access_key = ${DO_ACCESS_KEY}
          secret_key = ${DO_SECRET_KEY}
          host_base = fra1.digitaloceanspaces.com
          host_bucket = %(bucket)s.fra1.digitaloceanspaces.com
          bucket_location = fra1
          use_https = True
          EOF
          for PLATFORM in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            TARBALL="zally-${VERSION}-${PLATFORM}.tar.gz"
            s3cmd -c /tmp/do-spaces.s3cfg put "${TARBALL}" s3://vote/ --acl-public --force
          done
          echo "${VERSION}" > /tmp/version.txt
          s3cmd -c /tmp/do-spaces.s3cfg put /tmp/version.txt s3://vote/version.txt --acl-public --force
          s3cmd -c /tmp/do-spaces.s3cfg put join.sh s3://vote/join.sh --acl-public --force

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CEREMONY_SSH_KEY }}" > ~/.ssh/ceremony_key
          chmod 600 ~/.ssh/ceremony_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/ceremony_key
            StrictHostKeyChecking no
          EOF

      - name: Upload release assets to server
        run: |
          ssh deploy-target "mkdir -p /opt/zally-chain/releases"
          for PLATFORM in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            TARBALL="zally-${VERSION}-${PLATFORM}.tar.gz"
            scp "${TARBALL}" deploy-target:/opt/zally-chain/releases/
          done
          scp join.sh deploy-target:/opt/zally-chain/releases/join.sh
          ssh deploy-target "echo '${VERSION}' > /opt/zally-chain/releases/version.txt"
