# Build pre-compiled binaries and publish a GitHub Release on version tags.
#
# Tarball layout:
#   zally-<version>-linux-amd64/
#     bin/zallyd, create-val-tx, query-server, ingest-nfs
#     systemd/zallyd-val{1,2,3}.service, nullifier-query-server.service
#     scripts/init_multi_ci.sh
#     config/Caddyfile

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-sdk:
    name: Build SDK chain
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            sdk/circuits/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-sdk-circuits-${{ hashFiles('sdk/circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sdk-circuits-

      - name: Build Rust circuits library
        run: make circuits

      - name: Build zallyd with FFI
        run: make build-ffi

      - name: Build create-val-tx helper
        run: go build -o create-val-tx ./scripts/create-val-tx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-binaries
          path: |
            sdk/zallyd
            sdk/create-val-tx

  build-ingest:
    name: Build nullifier-ingest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            nullifier-ingest/imt-tree/target
            nullifier-ingest/service/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-nullifier-ingest-${{ hashFiles('nullifier-ingest/service/Cargo.lock', 'nullifier-ingest/imt-tree/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-nullifier-ingest-

      - name: Build release binaries
        run: make build
        working-directory: nullifier-ingest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ingest-binaries
          path: |
            nullifier-ingest/service/target/release/query-server
            nullifier-ingest/service/target/release/ingest-nfs

  release:
    name: Package and release
    runs-on: ubuntu-latest
    needs: [build-sdk, build-ingest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SDK binaries
        uses: actions/download-artifact@v4
        with:
          name: sdk-binaries

      - name: Download ingest binaries
        uses: actions/download-artifact@v4
        with:
          name: ingest-binaries

      - name: Assemble tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="zally-${VERSION}-linux-amd64"
          mkdir -p "${DIR}/bin" "${DIR}/systemd" "${DIR}/scripts" "${DIR}/config"

          # Binaries
          cp sdk/zallyd sdk/create-val-tx "${DIR}/bin/"
          cp nullifier-ingest/service/target/release/query-server "${DIR}/bin/"
          cp nullifier-ingest/service/target/release/ingest-nfs "${DIR}/bin/"
          chmod +x "${DIR}/bin/"*

          # Systemd service files — transform paths for /opt/zally layout
          for f in sdk/docs/zallyd-val{1,2,3}.service; do
            name=$(basename "$f")
            sed -e 's|/opt/zally-chain|/opt/zally|g' \
                -e 's|ExecStart=/opt/zally/zallyd|ExecStart=/opt/zally/bin/zallyd|' \
                "$f" > "${DIR}/systemd/${name}"
          done

          # Nullifier query server service — remap paths to /opt/zally layout
          sed -e 's|WorkingDirectory=/opt/nullifier-ingest|WorkingDirectory=/opt/zally/nullifier-data|' \
              -e 's|DATA_DIR=/opt/nullifier-ingest|DATA_DIR=/opt/zally/nullifier-data|' \
              -e 's|ExecStart=/opt/nullifier-ingest/query-server|ExecStart=/opt/zally/bin/query-server|' \
              nullifier-ingest/docs/nullifier-query-server.service > "${DIR}/systemd/nullifier-query-server.service"

          # Scripts
          cp sdk/scripts/init_multi_ci.sh "${DIR}/scripts/"

          # Config
          cp sdk/deploy/Caddyfile "${DIR}/config/"

          # Create tarball
          tar czf "${DIR}.tar.gz" "${DIR}"
          echo "TARBALL=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          generate_release_notes: true
