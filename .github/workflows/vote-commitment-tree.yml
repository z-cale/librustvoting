name: Vote Commitment Tree Tests

on:
  push:
    branches: [main]
    paths:
      - 'vote-commitment-tree/**'
      - 'nullifier-ingest/imt-tree/**'
  pull_request:
    branches: [main]
    paths:
      - 'vote-commitment-tree/**'
      - 'nullifier-ingest/imt-tree/**'

permissions:
  contents: read

jobs:
  test-vote-commitment-tree:
    name: Vote Commitment Tree Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            vote-commitment-tree/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-vote-tree-${{ hashFiles('vote-commitment-tree/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-vote-tree-
      - name: Run unit tests
        run: cargo test --lib
        working-directory: vote-commitment-tree
      - name: Run integration tests
        run: cargo test --test client_server_integration -- --nocapture
        working-directory: vote-commitment-tree
