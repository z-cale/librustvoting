syntax = "proto3";
package zvote.v1;

import "zvote/v1/types.proto";

option go_package = "github.com/z-cale/zally/x/vote/types";

// Query defines the vote module's gRPC query service.
service Query {
  // CommitmentTreeAtHeight returns the commitment tree root at a specific anchor height.
  rpc CommitmentTreeAtHeight(QueryCommitmentTreeRequest) returns (QueryCommitmentTreeResponse);

  // LatestCommitmentTree returns the latest commitment tree state.
  rpc LatestCommitmentTree(QueryLatestTreeRequest) returns (QueryLatestTreeResponse);

  // VoteRound returns information about a specific vote round.
  rpc VoteRound(QueryVoteRoundRequest) returns (QueryVoteRoundResponse);

  // ProposalTally returns the accumulated tally for a proposal within a vote round.
  rpc ProposalTally(QueryProposalTallyRequest) returns (QueryProposalTallyResponse);

  // TallyResults returns finalized tally results for a vote round (after MsgSubmitTally).
  rpc TallyResults(QueryTallyResultsRequest) returns (QueryTallyResultsResponse);

  // CommitmentLeaves returns the commitment tree leaves organized by block height.
  // Used by remote clients implementing TreeSyncApi to sync the vote commitment tree.
  rpc CommitmentLeaves(QueryCommitmentLeavesRequest) returns (QueryCommitmentLeavesResponse);

  // ActiveRound returns the first active voting round, if any.
  // Iterates all stored rounds and returns the first with SESSION_STATUS_ACTIVE.
  rpc ActiveRound(QueryActiveRoundRequest) returns (QueryActiveRoundResponse);

  // CeremonyState returns the current EA key ceremony lifecycle state.
  rpc CeremonyState(QueryCeremonyStateRequest) returns (QueryCeremonyStateResponse);

  // VoteManager returns the current vote manager address.
  rpc VoteManager(QueryVoteManagerRequest) returns (QueryVoteManagerResponse);

  // ListRounds returns all stored vote rounds.
  rpc ListRounds(QueryListRoundsRequest) returns (QueryListRoundsResponse);
}

message QueryCommitmentTreeRequest {
  uint64 height = 1;
}

message QueryCommitmentTreeResponse {
  CommitmentTreeState tree = 1;
}

message QueryLatestTreeRequest {}

message QueryLatestTreeResponse {
  CommitmentTreeState tree = 1;
}

message QueryVoteRoundRequest {
  bytes vote_round_id = 1;
}

message QueryVoteRoundResponse {
  VoteRound round = 1;
}

message QueryProposalTallyRequest {
  bytes  vote_round_id = 1;
  uint32 proposal_id   = 2;
}

message QueryProposalTallyResponse {
  // Mapping from vote_decision to serialized ElGamal ciphertext (64 bytes each).
  map<uint32, bytes> tally = 1;
}

message QueryTallyResultsRequest {
  bytes vote_round_id = 1;
}

message QueryTallyResultsResponse {
  repeated TallyResult results = 1;
}

message QueryCommitmentLeavesRequest {
  uint64 from_height = 1;
  uint64 to_height   = 2;
}

message QueryCommitmentLeavesResponse {
  repeated BlockCommitments blocks = 1;
}

message QueryActiveRoundRequest {}

message QueryActiveRoundResponse {
  VoteRound round = 1;
}

message QueryCeremonyStateRequest {}

message QueryCeremonyStateResponse {
  CeremonyState ceremony = 1;
}

message QueryVoteManagerRequest {}

message QueryVoteManagerResponse {
  string address = 1;
}

message QueryListRoundsRequest {}

message QueryListRoundsResponse {
  repeated VoteRound rounds = 1;
}
